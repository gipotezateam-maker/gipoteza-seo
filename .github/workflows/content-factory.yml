name: content-factory

# ФАЗА 2: фабрика пишет .md-статьи в РЕПО САЙТА (gipoteza-landing),
# состояние тем (topics_*.csv) — в этот репо (gipoteza-seo).
# Пока только ручной запуск (workflow_dispatch). Крон включим после первого
# успешного прогона (autopilot публикации в прод — осознанный шаг).
# Anthropic API недоступен из РФ → запуск на runner'ах GitHub (US/EU).
#
# ТРЕБУЕТСЯ СЕКРЕТ: SITE_REPO_TOKEN — PAT с правом write на gipotezateam-maker/gipoteza-landing
# (fine-grained: Contents → Read and write). Нужен, чтобы пушить статьи в чужой репо.

on:
  workflow_dispatch:
    inputs:
      articles_per_day:
        description: "Сколько статей сгенерировать (по умолчанию 5)"
        required: false
        default: "5"
      enable_editor_pass:
        description: "Включить этап редактора/фактчека (true/false)"
        required: false
        default: "true"
      use_batch:
        description: "Batch API (−50%, чуть дольше). false → старый последовательный режим"
        required: false
        default: "true"

permissions:
  # Для коммита/пуша состояния тем (topics_*.csv) в ЭТОТ репо
  contents: write

concurrency:
  group: content-factory
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout factory repo (gipoteza-seo)
        uses: actions/checkout@v4
        with:
          # persist-credentials: true → orchestrator пушит состояние (CSV) в этот репо
          # через GITHUB_TOKEN
          persist-credentials: true

      - name: Checkout site repo (gipoteza-landing) into ./site
        uses: actions/checkout@v4
        with:
          repository: gipotezateam-maker/gipoteza-landing
          token: ${{ secrets.SITE_REPO_TOKEN }}
          path: site
          persist-credentials: true
          # depth 2 — чтобы шаг ping посчитал git diff новых статей (base=HEAD до прогона)
          fetch-depth: 2

      - name: Capture site base SHA (для ping-диффа)
        run: echo "SITE_BASE_SHA=$(git -C site rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: content-factory/requirements.txt

      - name: Install dependencies
        working-directory: content-factory
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git author
        run: |
          git config --global user.email "bot@gipoteza-agency.ru"
          git config --global user.name "content-factory"

      - name: Run orchestrator
        working-directory: content-factory
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

          EMAIL_FROM: "onboarding@resend.dev"
          EMAIL_TO: "neondinozavr@gmail.com"
          EMAIL_FROM_FALLBACK: "onboarding@resend.dev"

          ARTICLES_PER_DAY: ${{ github.event.inputs.articles_per_day || '5' }}
          ENABLE_EDITOR_PASS: ${{ github.event.inputs.enable_editor_pass || 'true' }}
          USE_BATCH: ${{ github.event.inputs.use_batch || 'true' }}
          TIMEZONE: Europe/Moscow

          # Статьи → репо сайта (чекаут ./site), состояние → этот репо (workspace)
          SITE_REPO_PATH: ${{ github.workspace }}/site
          SITE_BLOG_DIR: client/src/content/blog
          SITE_REPO_BRANCH: main
          STATE_REPO_BRANCH: main
        run: python orchestrator.py

      # Пинг поисковиков о свежих статьях — по git diff репо САЙТА (./site),
      # от базового SHA (до прогона) к HEAD (после пуша статей).
      - name: Ping search engines (IndexNow + Я.Вебмастер + GSC)
        if: success()
        working-directory: site
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: https://gipoteza-agency.ru/
          YANDEX_WEBMASTER_TOKEN: ${{ secrets.YANDEX_WEBMASTER_TOKEN }}
          YANDEX_WEBMASTER_USER_ID: ${{ secrets.YANDEX_WEBMASTER_USER_ID }}
          YANDEX_WEBMASTER_HOST_ID: ${{ secrets.YANDEX_WEBMASTER_HOST_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL_BASE: https://gipoteza-agency.ru
          SITEMAP_URL: https://gipoteza-agency.ru/sitemap.xml
        run: |
          pip install google-api-python-client google-auth google-auth-oauthlib requests
          python3 "$GITHUB_WORKSPACE/seo-agent/scripts/ping_new_urls.py" --from-git-diff --base-ref="$SITE_BASE_SHA" --head-ref=HEAD

      - name: Upload run log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-factory-log-${{ github.run_id }}
          path: content-factory/logs/
          retention-days: 14
          if-no-files-found: ignore
